name: Deploy AVO API → Hetzner

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/shared/**'

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/tural-musab/avo-api

jobs:
  build-and-push:
    name: Build & Push (multi-arch)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (linux/amd64 + linux/arm64)
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy on Production
    needs: build-and-push
    runs-on: [self-hosted, production]

    steps:
      - name: Pull & restart AVO API
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: tural-musab
        run: |
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
          docker pull ghcr.io/tural-musab/avo-api:latest

          docker stop avo-api 2>/dev/null || true
          docker rm   avo-api 2>/dev/null || true

          docker run -d \
            --name avo-api \
            --restart unless-stopped \
            --network avo-network \
            -p 127.0.0.1:3919:3919 \
            --env-file /opt/avo/.env \
            ghcr.io/tural-musab/avo-api:latest

          docker image prune -f

      - name: Health check
        run: |
          sleep 5
          curl -sf http://127.0.0.1:3919/api/v1/health || (docker logs avo-api && exit 1)
